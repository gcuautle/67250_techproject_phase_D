<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="../static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <script src="../static/script.js" defer></script>
</head>

<body>

<div class="container">

<header class="header">
    <img id="logo" src="../static/monomuselogo.png" alt="MonoMuse Museum Logo">
</header>

<nav class="nav_bar">
    <a href="../index.html">Home</a>
    <a href="explore.html">Explore</a>
    <a href="exhibitions.html">Exhibitions</a>
    <a href="tickets.html">Buy Tickets</a>
    <a href="checkout.html">Checkout</a>
</nav>

<main class="main">

    <form>
        <div>
            <label for="name">Name (required):</label>
            <input type="text" id="name" name="name" required>
        </div>

        <div>
            <label for="email">Email (required):</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div>
            <label for="quantity">Ticket Quantity (required):</label>
            <input type="number" id="quantity" name="quantity" min="1" required>
        </div>

        <button type="submit">Submit</button>
    </form>

</main>

<figure class="main_img"></figure>

<footer class="footer">
    &copy; <span id="copyYear"></span> MonoMuse. All rights reserved
</footer>

</div>

</body>
</html>
