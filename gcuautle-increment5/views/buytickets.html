<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Tickets</title>
    <link rel="stylesheet" href="../static/style.css">
    <script src="../static/script.js" defer></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="container">

<header class="header">
    <img id="logo" src="../static/monomuselogo.png" alt="MonoMuse Logo">
</header>

<nav class="nav_bar">
        <a href="../index.html">Home</a>
        <a href="explore.html">Explore</a>
        <a href="exhibitions.html">Exhibitions</a>
    <a href="buytickets.html">Buy Tickets</a>
        <a href="checkout.html">Checkout</a>
    </nav>

    <main class="main">

    <h2>Ticket Prices</h2>
    <table>
        <tr>
            <th>Type</th>
            <th>Description</th>
            <th>Price</th>
        </tr>
        <tr>
            <td>Adult</td>
            <td>18 and over</td>
            <td>$18</td>
        </tr>
        <tr>
            <td>Student</td>
            <td>Student ID required</td>
            <td>$10</td>
        </tr>
        <tr>
            <td>Member</td>
            <td>Member ID required</td>
            <td>$15</td>
        </tr>
    </table>

    <h2>Available Dates</h2>
    <table>
        <tr>
            <th>Date</th>
            <th>Action</th>
        </tr>
        <tr>
            <td>April 10</td>
            <td><button onclick="showForm('April 10')">Buy Now</button></td>
        </tr>
        <tr>
            <td>April 15</td>
            <td><button onclick="showForm('April 15')">Buy Now</button></td>
        </tr>
        <tr>
            <td>April 20</td>
            <td><button onclick="showForm('April 20')">Buy Now</button></td>
        </tr>
    </table>

    <!-- PURCHASE FORM -->
    <div id="ticketForm">

        <h2>Purchase Tickets</h2>

        <form>
            <label>Name:</label>
            <input type="text" required>

            <label>Email:</label>
            <input type="email" required>

            <label>Number of Tickets:</label>
            <input type="number" min="1" required>

            <label>Selected Date:</label>
            <input type="text" id="selectedDate" readonly>

            <button type="button" onclick="submitForm()">Submit</button>
        </form>

    </div>

</main>

<figure class="main_img"></figure>

<footer class="footer">
    &copy; <span id="copyYear"></span> MonoMuse. All rights reserved
</footer>

</div>

</body>
</html>
