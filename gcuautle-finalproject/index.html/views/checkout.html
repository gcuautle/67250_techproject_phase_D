<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    
    <link rel="stylesheet" href="../static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Your JS -->
    <script src="../static/script.js" defer></script>
</head>

<body>

<div class="container">

<header class="header">
    <img id="logo" src="../static/monomuselogo.png" alt="MonoMuse Museum Logo">
</header>

    <nav class="nav_bar" id="navbar">
        <button onclick="toggleMenu()">☰</button>
        <a href="../index.html">Home</a>
        <a href="explore.html">Explore</a>
        <a href="exhibitions.html">Exhibitions</a>
        <a href="tickets.html">Buy Tickets</a>
        <a href="checkout.html">Checkout</a>
    </nav>

<main class="main">


<div class="checkout-container">
    <form id="checkoutForm" onsubmit="return handleCheckout()">
        <h2 class="checkout-title">Checkout: Complete Your Purchase</h2>
        <!-- NAME -->
        <label for="name">Name (required):</label>
        <input type="text" id="name" required>


        <!-- DATE -->
        <label for="date">Visit Date (required):</label>
        <input type="date" id="date" required>

        <!-- TICKET TYPE -->
        <label for="ticketType">Ticket Type:</label>
        <select id="ticketType" required>
            <option value="">Select Type</option>
            <option value="general">General</option>
            <option value="student">Student</option>
            <option value="member">Member</option>
        </select>

        <!-- QUANTITY -->
        <label for="quantity">Quantity (1–10):</label>
        <input type="number" id="quantity" min="1" max="10" required>

        <!-- EMAIL -->
        <label for="email">Email:</label>
        <input type="email" id="email" required>

        <!-- ZIP -->
        <label for="zip">Zip Code (optional):</label>
        <input type="text" id="zip" placeholder="5-digit zip">

        <!-- MAILING LIST -->
        <label>
            <input type="checkbox" id="mailing"> Join our mailing list
        </label>

        <!-- PRICE -->
        <p>Total Price: $<span id="total">0</span></p>

        <button type="submit">Place Order</button>

    </form>
</div>

</main>

<figure class="main_img"></figure>

<footer class="footer">
    <p>&copy; <span id="copyYear"></span> MonoMuse&emsp;&emsp;&emsp;Contact Us:&emsp;Email: info@monomuse.com&emsp;Phone: (412) 123-4567</p>
</footer>

</div>

</body>
</html>
